<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontograma Digital Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print-hide { display: none !important; }
            .odontograma-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .odontograma-container { min-width: 750px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Iconos de Lucide
        const { 
            Printer, User, Phone, Trash2, Activity, Save, Plus, ArrowLeft, Check, History 
        } = lucideReact;

        // Estructura de dientes FDI
        const PERMANENT_QUADRANTS = {
            UR: { fdi: [18, 17, 16, 15, 14, 13, 12, 11] },
            UL: { fdi: [21, 22, 23, 24, 25, 26, 27, 28] },
            LR: { fdi: [48, 47, 46, 45, 44, 43, 42, 41] },
            LL: { fdi: [31, 32, 33, 34, 35, 36, 37, 38] }
        };

        const PRIMARY_QUADRANTS = {
            UR: { fdi: [55, 54, 53, 52, 51] },
            UL: { fdi: [61, 62, 63, 64, 65] },
            LR: { fdi: [85, 84, 83, 82, 81] },
            LL: { fdi: [71, 72, 73, 74, 75] }
        };

        const ALL_FDI_TEETH = [
            ...PERMANENT_QUADRANTS.UR.fdi, ...PERMANENT_QUADRANTS.UL.fdi, ...PERMANENT_QUADRANTS.LR.fdi, ...PERMANENT_QUADRANTS.LL.fdi,
            ...PRIMARY_QUADRANTS.UR.fdi, ...PRIMARY_QUADRANTS.UL.fdi, ...PRIMARY_QUADRANTS.LR.fdi, ...PRIMARY_QUADRANTS.LL.fdi
        ];

        const TOOLS = [
            { id: 'caries', name: 'Caries', type: 'surface', color: '#ef4444', icon: '🔴' },
            { id: 'restoration', name: 'Resina', type: 'surface', color: '#3b82f6', icon: '🔵' },
            { id: 'missing', name: 'Ausente', type: 'whole', icon: '✕' },
            { id: 'extract', name: 'Exodoncia', type: 'whole', icon: '⚠️' },
            { id: 'crown', name: 'Corona', type: 'whole', icon: '⭕' },
            { id: 'clear', name: 'Borrar', type: 'action', icon: '🗑️' }
        ];

        const initialTeethState = ALL_FDI_TEETH.reduce((acc, id) => {
            acc[id] = { top: '', bottom: '', left: '', right: '', center: '', whole: '' };
            return acc;
        }, {});

        function App() {
            const [view, setView] = useState('home');
            const [patientsList, setPatientsList] = useState([]);
            const [currentPatientId, setCurrentPatientId] = useState(null);
            const [patient, setPatient] = useState({ name: '', phone: '', email: '' });
            const [notes, setNotes] = useState('');
            const [teeth, setTeeth] = useState(initialTeethState);
            const [logs, setLogs] = useState([]);
            const [currentTool, setCurrentTool] = useState(TOOLS[0]);
            const [dentition, setDentition] = useState('adult');
            const [showSaveSuccess, setShowSaveSuccess] = useState(false);

            useEffect(() => {
                const data = localStorage.getItem('odontogram_app_data');
                if (data) setPatientsList(JSON.parse(data));
            }, []);

            const handleSave = () => {
                const id = currentPatientId || Date.now().toString();
                const newData = { 
                    id, patient, notes, teeth, logs, dentition, 
                    lastModified: new Date().toISOString() 
                };
                const newList = currentPatientId 
                    ? patientsList.map(p => p.id === id ? newData : p) 
                    : [...patientsList, newData];
                
                setPatientsList(newList);
                localStorage.setItem('odontogram_app_data', JSON.stringify(newList));
                setCurrentPatientId(id);
                setShowSaveSuccess(true);
                setTimeout(() => setShowSaveSuccess(false), 2000);
            };

            const handleToothClick = (fdiId, surface) => {
                setTeeth(prev => {
                    const tooth = { ...prev[fdiId] };
                    if (currentTool.id === 'clear') return { ...prev, [fdiId]: { top: '', bottom: '', left: '', right: '', center: '', whole: '' } };
                    if (currentTool.type === 'whole') {
                        tooth.whole = tooth.whole === currentTool.id ? '' : currentTool.id;
                    } else {
                        tooth[surface] = tooth[surface] === currentTool.id ? '' : currentTool.id;
                        tooth.whole = '';
                    }
                    return { ...prev, [fdiId]: tooth };
                });
            };

            const Tooth = ({ fdiId }) => {
                const state = teeth[fdiId];
                const getFill = (s) => s === 'caries' ? '#ef4444' : (s === 'restoration' ? '#3b82f6' : '#fff');
                return (
                    <div className="flex flex-col items-center gap-1">
                        <span className="text-[10px] font-bold text-slate-500">{fdiId}</span>
                        <div className="relative w-10 h-10 border border-slate-200 bg-white shadow-sm hover:border-sky-400 transition-colors">
                            <svg viewBox="0 0 100 100" className="w-full h-full cursor-pointer">
                                <polygon points="0,0 100,0 75,25 25,25" fill={getFill(state.top)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'top')} />
                                <polygon points="100,0 100,100 75,75 75,25" fill={getFill(state.right)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'right')} />
                                <polygon points="100,100 0,100 25,75 75,75" fill={getFill(state.bottom)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'bottom')} />
                                <polygon points="0,100 0,0 25,25 25,75" fill={getFill(state.left)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'left')} />
                                <rect x="25" y="25" width="50" height="50" fill={getFill(state.center)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'center')} />
                                {state.whole === 'missing' && <g><line x1="10" y1="10" x2="90" y2="90" stroke="#334155" strokeWidth="8" /><line x1="90" y1="10" x2="10" y2="90" stroke="#334155" strokeWidth="8" /></g>}
                                {state.whole === 'extract' && <g><line x1="10" y1="10" x2="90" y2="90" stroke="#ef4444" strokeWidth="8" /><line x1="90" y1="10" x2="10" y2="90" stroke="#ef4444" strokeWidth="8" /></g>}
                                {state.whole === 'crown' && <circle cx="50" cy="50" r="40" fill="none" stroke="#3b82f6" strokeWidth="6" />}
                            </svg>
                        </div>
                    </div>
                );
            };

            if (view === 'home') {
                return (
                    <div className="p-6 md:p-12 max-w-6xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">Clínica Dental</h1>
                                <p className="text-slate-500 font-medium">Panel de Control de Odontogramas</p>
                            </div>
                            <button onClick={() => { setView('editor'); setCurrentPatientId(null); setPatient({name:'', phone:'', email:''}); setTeeth(initialTeethState); }} className="bg-sky-600 hover:bg-sky-700 text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-xl shadow-sky-200 transition-all active:scale-95">
                                <Plus size={20}/> Nuevo Paciente
                            </button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {patientsList.length === 0 ? (
                                <div className="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                    <p className="text-slate-400 font-medium">No hay pacientes registrados aún.</p>
                                </div>
                            ) : (
                                patientsList.map(p => (
                                    <div key={p.id} onClick={() => { setCurrentPatientId(p.id); setPatient(p.patient); setNotes(p.notes); setTeeth(p.teeth); setDentition(p.dentition || 'adult'); setView('editor'); }} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm cursor-pointer hover:shadow-xl hover:border-sky-200 transition-all group">
                                        <div className="bg-sky-50 w-12 h-12 rounded-2xl flex items-center justify-center text-sky-600 mb-6 group-hover:bg-sky-600 group-hover:text-white transition-colors"><User size={24}/></div>
                                        <h3 className="font-bold text-slate-800 text-lg mb-1">{p.patient.name || 'Sin Nombre'}</h3>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Última visita: {new Date(p.lastModified).toLocaleDateString()}</p>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md border-b p-4 sticky top-0 z-30 flex justify-between items-center print-hide shadow-sm">
                        <button onClick={() => setView('home')} className="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-bold px-4 py-2 rounded-xl hover:bg-slate-100 transition-all"><ArrowLeft size={18}/> Volver</button>
                        <div className="flex gap-2">
                            <button onClick={handleSave} className={`px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all ${showSaveSuccess ? 'bg-green-500 text-white' : 'bg-sky-600 text-white shadow-lg shadow-sky-100 hover:bg-sky-700'}`}>
                                {showSaveSuccess ? <Check size={20}/> : <Save size={20}/>}
                                <span>{showSaveSuccess ? 'Guardado' : 'Guardar'}</span>
                            </button>
                            <button onClick={() => window.print()} className="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-slate-200"><Printer size={20}/> Imprimir</button>
                        </div>
                    </header>

                    <main className="p-4 md:p-8 max-w-7xl mx-auto w-full flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Lateral: Info Paciente */}
                        <div className="lg:col-span-4 space-y-6">
                            <section className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm odontograma-card">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2"><User size={14}/> Ficha del Paciente</h2>
                                <div className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">NOMBRE COMPLETO</label>
                                        <input type="text" className="w-full border-transparent bg-slate-50 p-3.5 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-sky-500 transition-all font-medium" placeholder="Juan Pérez..." value={patient.name} onChange={e => setPatient({...patient, name: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">TELÉFONO DE CONTACTO</label>
                                        <input type="tel" className="w-full border-transparent bg-slate-50 p-3.5 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-sky-500 transition-all font-medium" placeholder="+56 9..." value={patient.phone} onChange={e => setPatient({...patient, phone: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500 ml-1">OBSERVACIONES CLÍNICAS</label>
                                        <textarea className="w-full border-transparent bg-slate-50 p-4 rounded-2xl text-sm h-48 resize-none outline-none focus:ring-2 focus:ring-sky-500 transition-all font-medium" placeholder="Escriba aquí los hallazgos..." value={notes} onChange={e => setNotes(e.target.value)}></textarea>
                                    </div>
                                </div>
                            </section>
                        </div>

                        {/* Principal: Odontograma */}
                        <div className="lg:col-span-8 space-y-6">
                            {/* Herramientas */}
                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm print-hide">
                                <div className="flex justify-between items-center mb-6 px-2">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Herramientas de Diagnóstico</h3>
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                        <button onClick={() => setDentition('adult')} className={`px-5 py-2 text-[10px] font-black rounded-xl transition-all ${dentition === 'adult' ? 'bg-white shadow-sm text-sky-600' : 'text-slate-400 hover:text-slate-600'}`}>ADULTO</button>
                                        <button onClick={() => setDentition('child')} className={`px-5 py-2 text-[10px] font-black rounded-xl transition-all ${dentition === 'child' ? 'bg-white shadow-sm text-sky-600' : 'text-slate-400 hover:text-slate-600'}`}>INFANTIL</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 md:grid-cols-6 gap-3">
                                    {TOOLS.map(t => (
                                        <button key={t.id} onClick={() => setCurrentTool(t)} className={`flex flex-col items-center gap-2 p-3.5 rounded-2xl border-2 transition-all ${currentTool.id === t.id ? 'border-sky-500 bg-sky-50 shadow-inner' : 'bg-white border-transparent hover:bg-slate-50'}`}>
                                            <span className="text-2xl">{t.icon}</span>
                                            <span className="text-[9px] font-black text-slate-600 uppercase tracking-tighter">{t.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* El Odontograma */}
                            <div className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm overflow-x-auto odontograma-card">
                                <div className="odontograma-container space-y-16 py-6">
                                    <div className="flex justify-center gap-12 relative">
                                        <div className="flex gap-2.5">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).UR.fdi.map(id => <Tooth key={id} fdiId={id}/>)}</div>
                                        <div className="w-px bg-slate-100 absolute left-1/2 h-full"></div>
                                        <div className="flex gap-2.5">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).UL.fdi.map(id => <Tooth key={id} fdiId={id}/>)}</div>
                                    </div>
                                    <div className="flex justify-center gap-12 relative">
                                        <div className="flex gap-2.5">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).LR.fdi.map(id => <Tooth key={id} fdiId={id}/>)}</div>
                                        <div className="w-px bg-slate-100 absolute left-1/2 h-full"></div>
                                        <div className="flex gap-2.5">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).LL.fdi.map(id => <Tooth key={id} fdiId={id}/>)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                    <footer className="p-8 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] print-hide">Odontograma Digital Pro v2.0</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
