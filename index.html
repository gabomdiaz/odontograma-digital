<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontograma Digital Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print-hide { display: none !important; }
            .odontograma-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .tooth-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-dot {
            width: 8px;
            height: 8px;
            background: #0284c7;
            border-radius: 50%;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); opacity: 0.5; }
            to { transform: translateY(-10px); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="loading-overlay">
        <div class="flex gap-2 mb-4">
            <div class="loader-dot" style="animation-delay: 0s"></div>
            <div class="loader-dot" style="animation-delay: 0.1s"></div>
            <div class="loader-dot" style="animation-delay: 0.2s"></div>
        </div>
        <span class="text-slate-400 font-bold text-xs uppercase tracking-widest">Iniciando DentalPro</span>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        (function() {
            const { useState, useEffect, useMemo, useCallback } = React;

            const PERMANENT_QUADRANTS = {
                UR: { fdi: [18, 17, 16, 15, 14, 13, 12, 11] },
                UL: { fdi: [21, 22, 23, 24, 25, 26, 27, 28] },
                LR: { fdi: [48, 47, 46, 45, 44, 43, 42, 41] },
                LL: { fdi: [31, 32, 33, 34, 35, 36, 37, 38] }
            };

            const PRIMARY_QUADRANTS = {
                UR: { fdi: [55, 54, 53, 52, 51] },
                UL: { fdi: [61, 62, 63, 64, 65] },
                LR: { fdi: [85, 84, 83, 82, 81] },
                LL: { fdi: [71, 72, 73, 74, 75] }
            };

            const ALL_TEETH_IDS = [
                ...PERMANENT_QUADRANTS.UR.fdi, ...PERMANENT_QUADRANTS.UL.fdi, ...PERMANENT_QUADRANTS.LR.fdi, ...PERMANENT_QUADRANTS.LL.fdi,
                ...PRIMARY_QUADRANTS.UR.fdi, ...PRIMARY_QUADRANTS.UL.fdi, ...PRIMARY_QUADRANTS.LR.fdi, ...PRIMARY_QUADRANTS.LL.fdi
            ];

            const DENTAL_TOOLS = [
                { id: 'caries', name: 'Caries', type: 'surface', color: '#ef4444', icon: '🔴' },
                { id: 'restoration', name: 'Resina', type: 'surface', color: '#3b82f6', icon: '🔵' },
                { id: 'missing', name: 'Ausente', type: 'whole', icon: '✕' },
                { id: 'extract', name: 'Exodoncia', type: 'whole', icon: '⚠️' },
                { id: 'crown', name: 'Corona', type: 'whole', icon: '⭕' },
                { id: 'clear', name: 'Borrar', type: 'action', icon: '🗑️' }
            ];

            const GET_INITIAL_TEETH = () => ALL_TEETH_IDS.reduce((acc, id) => {
                acc[id] = { top: '', bottom: '', left: '', right: '', center: '', whole: '' };
                return acc;
            }, {});

            function App() {
                const [view, setView] = useState('home');
                const [patientsList, setPatientsList] = useState([]);
                const [currentPatientId, setCurrentPatientId] = useState(null);
                const [patient, setPatient] = useState({ name: '', phone: '', email: '' });
                const [notes, setNotes] = useState('');
                const [teeth, setTeeth] = useState(GET_INITIAL_TEETH());
                const [dentition, setDentition] = useState('adult');
                const [currentTool, setCurrentTool] = useState(DENTAL_TOOLS[0]);
                const [logs, setLogs] = useState([]);
                const [showSaveSuccess, setShowSaveSuccess] = useState(false);

                const Icons = useMemo(() => {
                    const l = window.lucideReact || {};
                    return {
                        Printer: l.Printer || (() => null),
                        User: l.User || (() => null),
                        Phone: l.Phone || (() => null),
                        Activity: l.Activity || (() => null),
                        Save: l.Save || (() => null),
                        Plus: l.Plus || (() => null),
                        ArrowLeft: l.ArrowLeft || (() => null),
                        Check: l.Check || (() => null),
                        Search: l.Search || (() => null),
                        Clock: l.History || l.Clock || (() => null),
                        Trash: l.Trash2 || (() => null)
                    };
                }, []);

                useEffect(() => {
                    const loader = document.getElementById('loading-overlay');
                    if (loader) setTimeout(() => loader.style.display = 'none', 800);

                    const stored = localStorage.getItem('dental_pro_db_v11');
                    if (stored) {
                        try {
                            setPatientsList(JSON.parse(stored));
                        } catch (e) { console.error(e); }
                    }
                }, []);

                const handleSave = useCallback(() => {
                    const id = currentPatientId || Date.now().toString();
                    const newData = { 
                        id, patient, notes, teeth, dentition, logs,
                        lastModified: new Date().toISOString() 
                    };
                    const newList = currentPatientId 
                        ? patientsList.map(p => p.id === id ? newData : p) 
                        : [newData, ...patientsList];
                    
                    setPatientsList(newList);
                    localStorage.setItem('dental_pro_db_v11', JSON.stringify(newList));
                    setCurrentPatientId(id);
                    setShowSaveSuccess(true);
                    setTimeout(() => setShowSaveSuccess(false), 2000);
                }, [currentPatientId, patient, notes, teeth, dentition, logs, patientsList]);

                const handleToothClick = (fdiId, surface) => {
                    const toothBefore = { ...teeth[fdiId] };
                    let actionDesc = "";

                    setTeeth(prev => {
                        const tooth = { ...prev[fdiId] };
                        if (currentTool.id === 'clear') {
                            actionDesc = `Se limpió el diente ${fdiId}`;
                            return { ...prev, [fdiId]: { top: '', bottom: '', left: '', right: '', center: '', whole: '' } };
                        }
                        
                        if (currentTool.type === 'whole') {
                            const active = tooth.whole === currentTool.id;
                            tooth.whole = active ? '' : currentTool.id;
                            actionDesc = `${active ? 'Removido' : 'Aplicado'} ${currentTool.name} en diente ${fdiId}`;
                        } else {
                            const active = tooth[surface] === currentTool.id;
                            tooth[surface] = active ? '' : currentTool.id;
                            tooth.whole = '';
                            actionDesc = `${active ? 'Removido' : 'Detectado'} ${currentTool.name} en cara ${surface} del diente ${fdiId}`;
                        }
                        return { ...prev, [fdiId]: tooth };
                    });

                    setLogs(prev => [{
                        id: Date.now(),
                        timestamp: new Date().toISOString(),
                        text: actionDesc
                    }, ...prev].slice(0, 50));
                };

                const ToothComp = ({ fdiId }) => {
                    const state = teeth[fdiId] || { top: '', bottom: '', left: '', right: '', center: '', whole: '' };
                    const getFill = (s) => s === 'caries' ? '#ef4444' : (s === 'restoration' ? '#3b82f6' : '#fff');
                    
                    return (
                        <div className="flex flex-col items-center gap-1.5">
                            <span className="text-[10px] font-black text-slate-400">{fdiId}</span>
                            <div className="relative w-11 h-11 border border-slate-100 bg-white shadow-[0_2px_10px_-3px_rgba(0,0,0,0.07)] rounded-sm tooth-transition hover:shadow-xl hover:-translate-y-1 z-10 hover:z-20 overflow-hidden">
                                <svg viewBox="0 0 100 100" className="w-full h-full cursor-pointer">
                                    <polygon points="0,0 100,0 75,25 25,25" fill={getFill(state.top)} stroke="#cbd5e1" strokeWidth="1" onClick={() => handleToothClick(fdiId, 'top')} />
                                    <polygon points="100,0 100,100 75,75 75,25" fill={getFill(state.right)} stroke="#cbd5e1" strokeWidth="1" onClick={() => handleToothClick(fdiId, 'right')} />
                                    <polygon points="100,100 0,100 25,75 75,75" fill={getFill(state.bottom)} stroke="#cbd5e1" strokeWidth="1" onClick={() => handleToothClick(fdiId, 'bottom')} />
                                    <polygon points="0,100 0,0 25,25 25,75" fill={getFill(state.left)} stroke="#cbd5e1" strokeWidth="1" onClick={() => handleToothClick(fdiId, 'left')} />
                                    <rect x="25" y="25" width="50" height="50" fill={getFill(state.center)} stroke="#cbd5e1" strokeWidth="1" onClick={() => handleToothClick(fdiId, 'center')} />
                                    {state.whole === 'missing' && <g><line x1="15" y1="15" x2="85" y2="85" stroke="#334155" strokeWidth="10" /><line x1="85" y1="15" x2="15" y2="85" stroke="#334155" strokeWidth="10" /></g>}
                                    {state.whole === 'extract' && <g><line x1="15" y1="15" x2="85" y2="85" stroke="#ef4444" strokeWidth="10" /><line x1="85" y1="15" x2="15" y2="85" stroke="#ef4444" strokeWidth="10" /></g>}
                                    {state.whole === 'crown' && <circle cx="50" cy="50" r="38" fill="none" stroke="#3b82f6" strokeWidth="8" />}
                                </svg>
                            </div>
                        </div>
                    );
                };

                if (view === 'home') {
                    return (
                        <div className="p-8 md:p-16 max-w-6xl mx-auto">
                            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8">
                                <div>
                                    <h1 className="text-5xl font-[900] text-slate-900 tracking-tighter mb-2 italic">DENTAL<span className="text-sky-600">PRO</span></h1>
                                    <div className="flex items-center gap-2">
                                        <div className="w-8 h-1 bg-sky-500 rounded-full"></div>
                                        <p className="text-slate-400 font-bold uppercase tracking-[0.2em] text-[10px]">Gestión Clínica Digital</p>
                                    </div>
                                </div>
                                <button onClick={() => { setView('editor'); setCurrentPatientId(null); setPatient({name:'', phone:'', email:''}); setTeeth(GET_INITIAL_TEETH()); setNotes(''); setLogs([]); }} className="bg-slate-900 hover:bg-sky-600 text-white px-10 py-5 rounded-[2rem] font-extrabold flex items-center gap-3 shadow-2xl transition-all hover:scale-105 active:scale-95 group">
                                    <Icons.Plus size={22} className="group-hover:rotate-90 transition-transform duration-300"/> Nuevo Paciente
                                </button>
                            </header>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {patientsList.length === 0 ? (
                                    <div className="col-span-full py-32 text-center bg-white rounded-[3rem] border border-slate-100 shadow-sm">
                                        <div className="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-200">
                                            <Icons.Search size={40}/>
                                        </div>
                                        <p className="text-slate-400 font-bold uppercase tracking-widest text-[11px]">Bandeja de pacientes vacía</p>
                                    </div>
                                ) : (
                                    patientsList.map(p => (
                                        <div key={p.id} onClick={() => { 
                                            setCurrentPatientId(p.id); setPatient(p.patient); setNotes(p.notes); 
                                            setTeeth(p.teeth); setDentition(p.dentition || 'adult'); setLogs(p.logs || []); setView('editor'); 
                                        }} className="bg-white p-8 rounded-[3rem] border border-slate-50 shadow-sm cursor-pointer hover:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.1)] hover:-translate-y-2 transition-all group border-b-4 border-b-transparent hover:border-b-sky-500">
                                            <div className="bg-sky-50 w-14 h-14 rounded-2xl flex items-center justify-center text-sky-600 mb-8 group-hover:bg-sky-600 group-hover:text-white transition-all">
                                                <Icons.User size={28}/>
                                            </div>
                                            <h3 className="font-extrabold text-slate-800 text-2xl mb-1 leading-tight">{p.patient.name || 'Sin Nombre'}</h3>
                                            <div className="flex items-center gap-2 text-slate-400 mb-8">
                                                <Icons.Phone size={14}/>
                                                <span className="text-sm font-semibold">{p.patient.phone || 'No registrado'}</span>
                                            </div>
                                            <div className="flex justify-between items-center pt-6 border-t border-slate-50">
                                                <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Activo</span>
                                                <span className="text-[10px] font-bold text-slate-400">{new Date(p.lastModified).toLocaleDateString()}</span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen flex flex-col bg-[#F8FAFC]">
                        <header className="bg-white/80 backdrop-blur-xl border-b border-slate-100 p-5 sticky top-0 z-50 flex justify-between items-center print-hide">
                            <button onClick={() => setView('home')} className="text-slate-500 hover:text-slate-900 flex items-center gap-3 font-bold px-5 py-2.5 rounded-2xl hover:bg-slate-50 transition-all">
                                <Icons.ArrowLeft size={20}/> Volver al Inicio
                            </button>
                            <div className="flex gap-4">
                                <button onClick={handleSave} className={`px-10 py-3.5 rounded-2xl font-black flex items-center gap-2 transition-all shadow-xl active:scale-95 ${showSaveSuccess ? 'bg-green-500 text-white shadow-green-100' : 'bg-sky-600 text-white shadow-sky-100 hover:bg-sky-700'}`}>
                                    {showSaveSuccess ? <Icons.Check size={20}/> : <Icons.Save size={20}/>}
                                    <span>{showSaveSuccess ? 'Guardado Exitoso' : 'Guardar Ficha'}</span>
                                </button>
                                <button onClick={() => window.print()} className="bg-slate-900 hover:bg-black text-white px-10 py-3.5 rounded-2xl font-black flex items-center gap-2 transition-all shadow-xl active:scale-95">
                                    <Icons.Printer size={20}/> Imprimir
                                </button>
                            </div>
                        </header>

                        <main className="p-6 md:p-10 max-w-full mx-auto w-full flex-1 grid grid-cols-1 lg:grid-cols-12 gap-10">
                            {/* Panel Izquierdo: Información y Logs */}
                            <div className="lg:col-span-4 space-y-8">
                                <section className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm odontograma-card">
                                    <h2 className="text-[11px] font-[900] text-slate-400 uppercase tracking-[0.3em] mb-10 flex items-center gap-3 italic">
                                        <div className="w-2 h-2 rounded-full bg-sky-500"></div> Ficha de Identificación
                                    </h2>
                                    <div className="space-y-8">
                                        <div className="group">
                                            <label className="text-[10px] font-black text-slate-400 ml-1 mb-2 block tracking-widest group-focus-within:text-sky-500 transition-colors">NOMBRE DEL PACIENTE</label>
                                            <input type="text" className="w-full border-2 border-slate-50 bg-slate-50 p-5 rounded-[1.5rem] text-sm outline-none focus:bg-white focus:border-sky-100 transition-all font-bold text-slate-700 placeholder:text-slate-300" placeholder="Escriba el nombre completo..." value={patient.name} onChange={e => setPatient({...patient, name: e.target.value})} />
                                        </div>
                                        <div className="group">
                                            <label className="text-[10px] font-black text-slate-400 ml-1 mb-2 block tracking-widest group-focus-within:text-sky-500 transition-colors">TELÉFONO / WHATSAPP</label>
                                            <input type="tel" className="w-full border-2 border-slate-50 bg-slate-50 p-5 rounded-[1.5rem] text-sm outline-none focus:bg-white focus:border-sky-100 transition-all font-bold text-slate-700 placeholder:text-slate-300" placeholder="+..." value={patient.phone} onChange={e => setPatient({...patient, phone: e.target.value})} />
                                        </div>
                                        <div className="pt-8 border-t border-slate-50">
                                            <label className="text-[10px] font-black text-slate-400 ml-1 mb-2 block tracking-widest">OBSERVACIONES CLÍNICAS</label>
                                            <textarea className="w-full border-2 border-slate-50 bg-slate-50 p-6 rounded-[2rem] text-sm h-48 resize-none outline-none focus:bg-white focus:border-sky-100 transition-all font-medium text-slate-600 leading-relaxed" placeholder="Antecedentes, alergias, plan de tratamiento..." value={notes} onChange={e => setNotes(e.target.value)}></textarea>
                                        </div>
                                    </div>
                                </section>

                                {/* Historial de Cambios - LOOK AND FEEL PREMIUM */}
                                <section className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm print-hide">
                                    <h2 className="text-[11px] font-[900] text-slate-400 uppercase tracking-[0.3em] mb-8 flex items-center gap-3 italic">
                                        <Icons.Clock size={16} className="text-sky-500"/> Evolución y Cambios
                                    </h2>
                                    <div className="max-h-80 overflow-y-auto custom-scrollbar pr-2 space-y-4">
                                        {logs.length === 0 ? (
                                            <p className="text-slate-300 text-xs text-center py-10 font-bold uppercase tracking-widest italic">Sin actividad reciente</p>
                                        ) : (
                                            logs.map(log => (
                                                <div key={log.id} className="flex gap-4 group">
                                                    <div className="flex flex-col items-center">
                                                        <div className="w-2 h-2 rounded-full bg-sky-200 mt-2 group-hover:bg-sky-500 transition-colors"></div>
                                                        <div className="w-px h-full bg-slate-100 group-last:hidden"></div>
                                                    </div>
                                                    <div className="pb-6">
                                                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-tighter mb-1">
                                                            {new Date(log.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                                        </p>
                                                        <p className="text-xs font-bold text-slate-600 leading-relaxed">{log.text}</p>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>
                            </div>

                            {/* Panel Derecho: Odontograma y Herramientas */}
                            <div className="lg:col-span-8 space-y-8">
                                <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm print-hide">
                                    <div className="flex flex-col sm:flex-row justify-between items-center mb-10 gap-6">
                                        <div className="flex bg-slate-100 p-2 rounded-[2rem] w-full sm:w-auto">
                                            <button onClick={() => setDentition('adult')} className={`flex-1 sm:flex-none px-10 py-3 text-[10px] font-[900] rounded-[1.5rem] transition-all tracking-widest ${dentition === 'adult' ? 'bg-white shadow-xl text-sky-600' : 'text-slate-400 hover:text-slate-600'}`}>ADULTO</button>
                                            <button onClick={() => setDentition('child')} className={`flex-1 sm:flex-none px-10 py-3 text-[10px] font-[900] rounded-[1.5rem] transition-all tracking-widest ${dentition === 'child' ? 'bg-white shadow-xl text-sky-600' : 'text-slate-400 hover:text-slate-600'}`}>INFANTIL</button>
                                        </div>
                                        <div className="h-px bg-slate-100 flex-1 hidden sm:block mx-10"></div>
                                        <p className="text-[10px] font-black text-slate-300 uppercase italic tracking-[0.2em]">Paleta Clínica</p>
                                    </div>
                                    <div className="grid grid-cols-3 md:grid-cols-6 gap-6">
                                        {DENTAL_TOOLS.map(t => (
                                            <button key={t.id} onClick={() => setCurrentTool(t)} className={`flex flex-col items-center gap-4 p-6 rounded-[2.5rem] border-2 transition-all ${currentTool.id === t.id ? 'border-sky-500 bg-sky-50 shadow-inner' : 'bg-white border-transparent hover:bg-slate-50'}`}>
                                                <span className="text-4xl drop-shadow-sm">{t.icon}</span>
                                                <span className="text-[9px] font-black text-slate-600 uppercase tracking-tighter">{t.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-12 md:p-20 rounded-[4rem] border border-slate-100 shadow-2xl odontograma-card overflow-x-auto custom-scrollbar">
                                    <div className="min-w-[800px] space-y-24 py-10 relative">
                                        {/* Eje de simetría */}
                                        <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-50 opacity-50 z-0"></div>
                                        
                                        {/* Arcada Superior */}
                                        <div className="flex justify-center gap-20 relative z-10">
                                            <div className="flex gap-4">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).UR.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                            <div className="flex gap-4">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).UL.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                        </div>

                                        {/* Arcada Inferior */}
                                        <div className="flex justify-center gap-20 relative z-10">
                                            <div className="flex gap-4">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).LR.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                            <div className="flex gap-4">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).LL.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        })();
    </script>
</body>
</html>
