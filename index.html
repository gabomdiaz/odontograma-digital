<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontograma Digital Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <style>
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print-hide { display: none !important; }
            .odontograma-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .odontograma-container { min-width: 750px; }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-weight: bold;
            color: #0284c7;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="loading-overlay">Cargando DentalPro...</div>
    <div id="root"></div>

    <script type="text/babel">
        /**
         * FIX: Se envuelve en un bloque de ejecución inmediata para evitar 
         * conflictos de re-declaración de variables globales en Vercel.
         */
        (function() {
            const { useState, useEffect, useMemo, useCallback } = React;

            const PERMANENT_QUADRANTS = {
                UR: { fdi: [18, 17, 16, 15, 14, 13, 12, 11] },
                UL: { fdi: [21, 22, 23, 24, 25, 26, 27, 28] },
                LR: { fdi: [48, 47, 46, 45, 44, 43, 42, 41] },
                LL: { fdi: [31, 32, 33, 34, 35, 36, 37, 38] }
            };

            const PRIMARY_QUADRANTS = {
                UR: { fdi: [55, 54, 53, 52, 51] },
                UL: { fdi: [61, 62, 63, 64, 65] },
                LR: { fdi: [85, 84, 83, 82, 81] },
                LL: { fdi: [71, 72, 73, 74, 75] }
            };

            const ALL_TEETH_IDS = [
                ...PERMANENT_QUADRANTS.UR.fdi, ...PERMANENT_QUADRANTS.UL.fdi, ...PERMANENT_QUADRANTS.LR.fdi, ...PERMANENT_QUADRANTS.LL.fdi,
                ...PRIMARY_QUADRANTS.UR.fdi, ...PRIMARY_QUADRANTS.UL.fdi, ...PRIMARY_QUADRANTS.LR.fdi, ...PRIMARY_QUADRANTS.LL.fdi
            ];

            const DENTAL_TOOLS_CONFIG = [
                { id: 'caries', name: 'Caries', type: 'surface', color: '#ef4444', icon: '🔴' },
                { id: 'restoration', name: 'Resina', type: 'surface', color: '#3b82f6', icon: '🔵' },
                { id: 'missing', name: 'Ausente', type: 'whole', icon: '✕' },
                { id: 'extract', name: 'Exodoncia', type: 'whole', icon: '⚠️' },
                { id: 'crown', name: 'Corona', type: 'whole', icon: '⭕' },
                { id: 'clear', name: 'Borrar', type: 'action', icon: '🗑️' }
            ];

            const GET_INITIAL_TEETH = () => ALL_TEETH_IDS.reduce((acc, id) => {
                acc[id] = { top: '', bottom: '', left: '', right: '', center: '', whole: '' };
                return acc;
            }, {});

            function App() {
                const [view, setView] = useState('home');
                const [patientsList, setPatientsList] = useState([]);
                const [currentPatientId, setCurrentPatientId] = useState(null);
                const [patient, setPatient] = useState({ name: '', phone: '', email: '' });
                const [notes, setNotes] = useState('');
                const [teeth, setTeeth] = useState(GET_INITIAL_TEETH());
                const [dentition, setDentition] = useState('adult');
                const [currentTool, setCurrentTool] = useState(DENTAL_TOOLS_CONFIG[0]);
                const [showSaveSuccess, setShowSaveSuccess] = useState(false);

                // Carga de iconos segura
                const Icons = useMemo(() => {
                    const l = window.lucideReact || {};
                    return {
                        Printer: l.Printer || (() => null),
                        User: l.User || (() => null),
                        Phone: l.Phone || (() => null),
                        Activity: l.Activity || (() => null),
                        Save: l.Save || (() => null),
                        Plus: l.Plus || (() => null),
                        ArrowLeft: l.ArrowLeft || (() => null),
                        Check: l.Check || (() => null),
                        Search: l.Search || (() => null)
                    };
                }, []);

                useEffect(() => {
                    const loader = document.getElementById('loading-overlay');
                    if (loader) loader.style.display = 'none';

                    const stored = localStorage.getItem('odontogram_data_v10');
                    if (stored) {
                        try {
                            setPatientsList(JSON.parse(stored));
                        } catch (e) {
                            console.error("Error al cargar datos", e);
                        }
                    }
                }, []);

                const handleSave = useCallback(() => {
                    const id = currentPatientId || Date.now().toString();
                    const newData = { 
                        id, patient, notes, teeth, dentition, 
                        lastModified: new Date().toISOString() 
                    };
                    const newList = currentPatientId 
                        ? patientsList.map(p => p.id === id ? newData : p) 
                        : [newData, ...patientsList];
                    
                    setPatientsList(newList);
                    localStorage.setItem('odontogram_data_v10', JSON.stringify(newList));
                    setCurrentPatientId(id);
                    setShowSaveSuccess(true);
                    setTimeout(() => setShowSaveSuccess(false), 2000);
                }, [currentPatientId, patient, notes, teeth, dentition, patientsList]);

                const handleToothClick = (fdiId, surface) => {
                    setTeeth(prev => {
                        const tooth = { ...prev[fdiId] };
                        if (currentTool.id === 'clear') return { ...prev, [fdiId]: { top: '', bottom: '', left: '', right: '', center: '', whole: '' } };
                        if (currentTool.type === 'whole') {
                            tooth.whole = tooth.whole === currentTool.id ? '' : currentTool.id;
                        } else {
                            tooth[surface] = tooth[surface] === currentTool.id ? '' : currentTool.id;
                            tooth.whole = '';
                        }
                        return { ...prev, [fdiId]: tooth };
                    });
                };

                const ToothComp = ({ fdiId }) => {
                    const state = teeth[fdiId] || { top: '', bottom: '', left: '', right: '', center: '', whole: '' };
                    const getFill = (s) => s === 'caries' ? '#ef4444' : (s === 'restoration' ? '#3b82f6' : '#fff');
                    return (
                        <div className="flex flex-col items-center gap-1 group">
                            <span className="text-[10px] font-bold text-slate-400 group-hover:text-sky-600">{fdiId}</span>
                            <div className="relative w-10 h-10 border border-slate-200 bg-white shadow-sm hover:border-sky-400 transition-all transform hover:scale-110 z-10 hover:z-20">
                                <svg viewBox="0 0 100 100" className="w-full h-full cursor-pointer">
                                    <polygon points="0,0 100,0 75,25 25,25" fill={getFill(state.top)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'top')} />
                                    <polygon points="100,0 100,100 75,75 75,25" fill={getFill(state.right)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'right')} />
                                    <polygon points="100,100 0,100 25,75 75,75" fill={getFill(state.bottom)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'bottom')} />
                                    <polygon points="0,100 0,0 25,25 25,75" fill={getFill(state.left)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'left')} />
                                    <rect x="25" y="25" width="50" height="50" fill={getFill(state.center)} stroke="#e2e8f0" onClick={() => handleToothClick(fdiId, 'center')} />
                                    {state.whole === 'missing' && <g><line x1="10" y1="10" x2="90" y2="90" stroke="#334155" strokeWidth="8" /><line x1="90" y1="10" x2="10" y2="90" stroke="#334155" strokeWidth="8" /></g>}
                                    {state.whole === 'extract' && <g><line x1="10" y1="10" x2="90" y2="90" stroke="#ef4444" strokeWidth="8" /><line x1="90" y1="10" x2="10" y2="90" stroke="#ef4444" strokeWidth="8" /></g>}
                                    {state.whole === 'crown' && <circle cx="50" cy="50" r="40" fill="none" stroke="#3b82f6" strokeWidth="6" />}
                                </svg>
                            </div>
                        </div>
                    );
                };

                if (view === 'home') {
                    return (
                        <div className="p-6 md:p-12 max-w-6xl mx-auto">
                            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                                <div>
                                    <h1 className="text-4xl font-black text-slate-900 tracking-tight mb-1 italic">DENTAL<span className="text-sky-600">PRO</span></h1>
                                    <p className="text-slate-500 font-medium">Gestión Odontológica Profesional</p>
                                </div>
                                <button onClick={() => { setView('editor'); setCurrentPatientId(null); setPatient({name:'', phone:'', email:''}); setTeeth(GET_INITIAL_TEETH()); setNotes(''); }} className="bg-sky-600 hover:bg-sky-700 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 shadow-xl shadow-sky-100 transition-all active:scale-95">
                                    <Icons.Plus size={20}/> Nuevo Paciente
                                </button>
                            </header>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {patientsList.length === 0 ? (
                                    <div className="col-span-full py-24 text-center bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
                                        <div className="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                                            <Icons.Search size={32}/>
                                        </div>
                                        <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">No hay pacientes registrados</p>
                                    </div>
                                ) : (
                                    patientsList.map(p => (
                                        <div key={p.id} onClick={() => { setCurrentPatientId(p.id); setPatient(p.patient); setNotes(p.notes); setTeeth(p.teeth); setDentition(p.dentition || 'adult'); setView('editor'); }} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm cursor-pointer hover:shadow-2xl hover:border-sky-200 transition-all group relative overflow-hidden">
                                            <div className="bg-sky-50 w-12 h-12 rounded-2xl flex items-center justify-center text-sky-600 mb-6 group-hover:bg-sky-600 group-hover:text-white transition-colors">
                                                <Icons.User size={24}/>
                                            </div>
                                            <h3 className="font-bold text-slate-800 text-xl mb-1">{p.patient.name || 'Paciente sin nombre'}</h3>
                                            <div className="flex items-center gap-2 text-slate-400 mb-4">
                                                <Icons.Phone size={14}/>
                                                <span className="text-sm font-medium">{p.patient.phone || 'Sin teléfono'}</span>
                                            </div>
                                            <p className="text-slate-300 text-[10px] font-black uppercase tracking-widest border-t pt-4">Visita: {new Date(p.lastModified).toLocaleDateString()}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen flex flex-col bg-slate-50">
                        <header className="bg-white/90 backdrop-blur-md border-b p-4 sticky top-0 z-50 flex justify-between items-center print-hide shadow-sm">
                            <button onClick={() => setView('home')} className="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-bold px-4 py-2 rounded-xl hover:bg-slate-100 transition-all">
                                <Icons.ArrowLeft size={18}/> Salir
                            </button>
                            <div className="flex gap-3">
                                <button onClick={handleSave} className={`px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all ${showSaveSuccess ? 'bg-green-500 text-white' : 'bg-sky-600 text-white shadow-lg shadow-sky-100 hover:bg-sky-700 active:scale-95'}`}>
                                    {showSaveSuccess ? <Icons.Check size={20}/> : <Icons.Save size={20}/>}
                                    <span>{showSaveSuccess ? 'Guardado' : 'Guardar'}</span>
                                </button>
                                <button onClick={() => window.print()} className="bg-slate-900 hover:bg-black text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-slate-200 active:scale-95">
                                    <Icons.Printer size={20}/> Exportar
                                </button>
                            </div>
                        </header>

                        <main className="p-4 md:p-8 max-w-7xl mx-auto w-full flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-4 space-y-6">
                                <section className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm odontograma-card">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.25em] mb-8 flex items-center gap-2 italic">
                                        <Icons.Activity size={14} className="text-sky-500"/> Ficha del Paciente
                                    </h2>
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 ml-1">NOMBRE COMPLETO</label>
                                            <input type="text" className="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-2xl text-sm outline-none focus:bg-white focus:border-sky-200 transition-all font-bold text-slate-700" placeholder="Ej. Juan Pérez" value={patient.name} onChange={e => setPatient({...patient, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 ml-1">TELÉFONO</label>
                                            <input type="tel" className="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-2xl text-sm outline-none focus:bg-white focus:border-sky-200 transition-all font-bold text-slate-700" placeholder="+..." value={patient.phone} onChange={e => setPatient({...patient, phone: e.target.value})} />
                                        </div>
                                        <div className="space-y-2 pt-4 border-t border-slate-50">
                                            <label className="text-[10px] font-black text-slate-500 ml-1">NOTAS Y TRATAMIENTO</label>
                                            <textarea className="w-full border-2 border-slate-50 bg-slate-50 p-5 rounded-2xl text-sm h-64 resize-none outline-none focus:bg-white focus:border-sky-200 transition-all font-medium text-slate-600 leading-relaxed" placeholder="Notas del tratamiento..." value={notes} onChange={e => setNotes(e.target.value)}></textarea>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <div className="lg:col-span-8 space-y-6">
                                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm print-hide">
                                    <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 px-2">
                                        <div className="flex bg-slate-100 p-1.5 rounded-2xl w-full sm:w-auto">
                                            <button onClick={() => setDentition('adult')} className={`flex-1 sm:flex-none px-8 py-2.5 text-[10px] font-black rounded-xl transition-all ${dentition === 'adult' ? 'bg-white shadow-sm text-sky-600' : 'text-slate-400 hover:text-slate-600'}`}>ADULTO</button>
                                            <button onClick={() => setDentition('child')} className={`flex-1 sm:flex-none px-8 py-2.5 text-[10px] font-black rounded-xl transition-all ${dentition === 'child' ? 'bg-white shadow-sm text-sky-600' : 'text-slate-400 hover:text-slate-600'}`}>INFANTIL</button>
                                        </div>
                                        <p className="text-[10px] font-black text-slate-300 uppercase italic tracking-widest">Herramientas</p>
                                    </div>
                                    <div className="grid grid-cols-3 md:grid-cols-6 gap-4">
                                        {DENTAL_TOOLS_CONFIG.map(t => (
                                            <button key={t.id} onClick={() => setCurrentTool(t)} className={`flex flex-col items-center gap-3 p-5 rounded-[1.5rem] border-2 transition-all ${currentTool.id === t.id ? 'border-sky-500 bg-sky-50 shadow-inner' : 'bg-white border-transparent hover:bg-slate-50'}`}>
                                                <span className="text-3xl">{t.icon}</span>
                                                <span className="text-[9px] font-black text-slate-600 uppercase tracking-tighter">{t.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-12 rounded-[2.5rem] border border-slate-100 shadow-xl odontograma-card overflow-x-auto custom-scrollbar">
                                    <div className="odontograma-container space-y-20 py-10">
                                        <div className="flex justify-center gap-16 relative">
                                            <div className="flex gap-3">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).UR.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                            <div className="w-px bg-slate-100 absolute left-1/2 h-full opacity-50"></div>
                                            <div className="flex gap-3">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).UL.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                        </div>
                                        <div className="flex justify-center gap-16 relative">
                                            <div className="flex gap-3">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).LR.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                            <div className="w-px bg-slate-100 absolute left-1/2 h-full opacity-50"></div>
                                            <div className="flex gap-3">{(dentition === 'adult' ? PERMANENT_QUADRANTS : PRIMARY_QUADRANTS).LL.fdi.map(id => <ToothComp key={id} fdiId={id}/>)}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        })();
    </script>
</body>
</html>
